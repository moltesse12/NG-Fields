server:
  port: 8084
  shutdown: graceful
  forward-headers-strategy: native

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:8100}

spring:
  application:
    name: media-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: optional:file:${ENV_FILE:./.env}[.properties]
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/ng-fields}

media:
  upload-dir: ${MEDIA_UPLOAD_DIR:./uploads}
  max-file-size-bytes: ${MEDIA_MAX_FILE_SIZE:10485760}
  max-storage-bytes: ${MEDIA_MAX_STORAGE:5368709120}
  max-storage-per-company-bytes: ${MEDIA_MAX_STORAGE_PER_COMPANY:524288000}
  antivirus-enabled: ${MEDIA_ANTIVIRUS_ENABLED:false}
  clamav-host: ${CLAMAV_HOST:localhost}
  clamav-port: ${CLAMAV_PORT:3310}
  image-compression-quality: ${MEDIA_COMPRESSION_QUALITY:80}

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  traces-sample-rate: 0.2
  enable-tracing: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    env:
      keys-to-sanitize: password,secret,token,credential,admin-client-secret,smtp

logging:
  level:
    tg.ngstars.media: INFO
  request-response:
    enabled: ${LOG_REQUEST_RESPONSE:false}

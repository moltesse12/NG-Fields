server:
  port: 8086
  shutdown: graceful
  forward-headers-strategy: native

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:8100}

spring:
  application:
    name: report-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: optional:file:${ENV_FILE:./.env}[.properties]
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/ng-fields}

intervention-service:
  url: ${INTERVENTION_SERVICE_URL:http://localhost:8083}

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  traces-sample-rate: 0.2
  enable-tracing: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    env:
      keys-to-sanitize: password,secret,token,credential,admin-client-secret,smtp

resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.io.IOException
          - org.springframework.web.client.ResourceAccessException
          - java.net.http.HttpTimeoutException
    instances:
      interventionClient:
        base-config: default
  circuitbreaker:
    configs:
      default:
        sliding-window-size: 10
        minimum-number-of-calls: 5
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
    instances:
      interventionClient:
        base-config: default

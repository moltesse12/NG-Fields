spring:
  jpa:
    show-sql: true
    properties:
      hibernate:
        generate_statistics: true
  flyway:
    repair-on-migrate: true
  devtools:
    restart:
      enabled: true

springdoc:
  swagger-ui:
    enabled: true

keycloak:
  auth-server-url: http://localhost:8088
  admin-client-id: admin-cli
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}

logging:
  level:
    tg.ngstars: DEBUG
    org.springframework.security: DEBUG

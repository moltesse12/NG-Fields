server:
  port: 8081
  shutdown: graceful
  forward-headers-strategy: native

spring:
  application:
    name: auth-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: optional:file:${ENV_FILE:./.env}[.properties]
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ng_fields}?currentSchema=auth&sslmode=${DB_SSLMODE:prefer}
    username: ${DB_USER:ng_fields_user}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 10000
      idle-timeout: 300000
      max-lifetime: 1200000
      leak-detection-threshold: 10000
      pool-name: auth-service-hikari-pool
      metrics-enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        default_schema: auth
        default_batch_fetch_size: 10
        jdbc:
          batch_size: 30
          batch_versioned_data: true
        order_inserts: true
        order_updates: true
  flyway:
    enabled: true
    schemas: auth
    baseline-on-migrate: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/ng-fields}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:8100}
  jwt:
    secret: ${JWT_SECRET:YW5nLXN0YXJzLXNlY3JldC1rZXktZm9yLWVtYWlsLXZlcmlmaWNhdGlvbi0yMDI0}
  frontend:
    url: ${FRONTEND_URL:http://localhost:4200}
  security:
    lockout:
      max-attempts: 10
      window-minutes: 15
      duration-minutes: 30
      ip-max-attempts: 20

keycloak:
  auth-server-url: ${KEYCLOAK_AUTH_SERVER_URL:http://localhost:8088}
  admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:ng-fields-backend}
  admin-client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET:}
  realm: ${KEYCLOAK_REALM:ng-fields}

resend:
  api-key: ${RESEND_API_KEY:}
  from-email: ${RESEND_FROM_EMAIL:noreply@ng-stars.com}
  from-name: ${RESEND_FROM_NAME:NG-STARs}

resilience4j:
  retry:
    instances:
      emailService:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - java.lang.RuntimeException
        ignore-exceptions:
          - tg.ngstars.auth.exception.NotFoundException

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  traces-sample-rate: 0.2
  enable-tracing: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    env:
      keys-to-sanitize: password,secret,token,credential,admin-client-secret

logging:
  level:
    org.hibernate.SQL: WARN
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    tg.ngstars.auth: INFO
  request-response:
    enabled: ${LOG_REQUEST_RESPONSE:false}

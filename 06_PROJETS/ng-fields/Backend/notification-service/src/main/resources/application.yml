server:
  port: 8085
  shutdown: graceful
  forward-headers-strategy: native

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200,http://localhost:8100}

spring:
  application:
    name: notification-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  lifecycle:
    timeout-per-shutdown-phase: 30s
  config:
    import: optional:file:${ENV_FILE:./.env}[.properties]
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:1025}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8088/realms/ng-fields}

springdoc:
  swagger-ui:
    enabled: false
    path: /swagger-ui.html

sentry:
  dsn: ${SENTRY_DSN:}
  environment: ${SPRING_PROFILES_ACTIVE:dev}
  traces-sample-rate: 0.2
  enable-tracing: true

firebase:
  enabled: ${FIREBASE_ENABLED:false}
  service-account-path: ${FIREBASE_SERVICE_ACCOUNT:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    env:
      keys-to-sanitize: password,secret,token,credential,admin-client-secret,smtp

resilience4j:
  retry:
    configs:
      default:
        max-attempts: 3
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        retry-exceptions:
          - jakarta.mail.MessagingException
          - org.springframework.mail.MailException
          - java.io.IOException
    instances:
      emailService:
        base-config: default

notification:
  dlq-dir: ${NOTIFICATION_DLQ_DIR:./dlq}
  audit-dir: ${NOTIFICATION_AUDIT_DIR:./audit}

logging:
  level:
    tg.ngstars.notification: INFO
  request-response:
    enabled: ${LOG_REQUEST_RESPONSE:false}
